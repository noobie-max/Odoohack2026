version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: assetflow_db
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow
      POSTGRES_DB: assetflow
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - assetflow_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  assetflow_pgdata:
